header {
    position: sticky;
    top: 0;
	padding: 0.5em;
    box-shadow: 0 2px 4px var(--shadow-color);
    background-color: var(--bg-color-secondary);
    transition: background-color 0.3s, color 0.3s;
    
    z-index: 1000;
}
header:after {
	content: "";
	display: table;
	clear: both;
}

.header-container {
    display: flex;
    flex-wrap: wrap;
	align-items: center;
    max-width: 70em;
    margin-left: auto;
    margin-right: auto;
}

.header-right {
    margin-left: auto;
    font-size: 1.5rem;
}

.header-right a {
    color: var(--text-color) !important;
    margin-left: 0.5rem;
    transition: background-color 0.3s, color 0.3s;
}
.header-right a:hover {
    color: var(--link-color-hover) !important;
}

.home-link {
	font-size: 1.5em;
	font-weight: 700;
	margin-right: 2em;
    text-decoration: none !important;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.home-link .logo-img {
    max-height: 32px;
    width: auto;
}

/* Nav */
.nav {
	display: flex;
	padding: 0;
	margin: 0;
	list-style: none;
    align-items: center;
}
.nav-item {
	display: inline-block;
	margin-right: 1em;
}
.nav-item a[href]:not(:hover) {
	text-decoration: none;
}
.nav a[href][aria-current="page"] {
    font-weight: 700;
}

.toggle-dark {
    cursor: pointer;
}
.aside-content {
    margin-top: 2rem;
    margin-left: 0.5rem;
    padding: 0.5rem;
    font-size: 0.9rem;
    border-left: 1px solid var(--border-color);
    transition: border-color 0.3s;
}

.toc-container {
    position: sticky;
    top: 5rem;
}

.aside-content ol {
    list-style-type: none;    
    padding: 0;
    margin: 0;
}

.aside-content li {
    margin-left: 1rem;
    margin-top: 1rem;
}
footer {
    position: sticky;
    bottom: 0;
    margin-top: 1.5rem;
	padding: 0.5em;
    background-color: var(--bg-color-secondary);
    transition: background-color 0.3s, color 0.3s;
    box-shadow: 0 2px 4px var(--shadow-color);
    z-index: 1000;
}

.footer-container {

	align-items: center;
    gap: 0 1rem;
    
    max-width: 70em;
    margin-left: auto;
    margin-right: auto;
    
    font-weight: bold;
}

.footer-container a {
    color: var(--text-color);
    font-size: 1.5rem;
    transition: color 0.3s;
